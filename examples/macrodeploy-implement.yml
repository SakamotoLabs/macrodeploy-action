# Issue→PR: label an issue "macrodeploy" → an agent implements it and opens a PR
# (which then runs through the verify gate + review in macrodeploy.yml).
# Copy to .github/workflows/macrodeploy-implement.yml. Needs the ANTHROPIC_API_KEY secret.
name: MacroDeploy Implement
on:
  issues:
    types: [labeled]
jobs:
  implement:
    if: github.event.label.name == 'macrodeploy'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: sakamotolabs/macrodeploy-action@v1
        with:
          mode: implement
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          issue_number: ${{ github.event.issue.number }}
          issue_title: ${{ github.event.issue.title }}
          issue_body: ${{ github.event.issue.body }}
