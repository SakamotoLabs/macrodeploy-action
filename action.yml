name: "MacroDeploy"
description: "Run a project's build/test verify gate (auto-detected) and an optional AI review of the PR diff."
author: "Sakamoto Labs"
branding:
  icon: "check-circle"
  color: "green"

inputs:
  anthropic_api_key:
    description: "Anthropic API key. If omitted, the AI review is skipped (the verify gate still runs)."
    required: false
    default: ""
  claude_code_oauth_token:
    description: "Claude Code OAuth (Pro/Max subscription) token. Used when no API key is set, so AI runs draw on the user's plan instead of API billing."
    required: false
    default: ""
  fast:
    description: "Skip the build step (typecheck + lint + tests only)."
    required: false
    default: "false"
  review:
    description: "Post an AI review comment on the PR diff."
    required: false
    default: "true"
  model:
    description: "Claude model for the review."
    required: false
    default: "claude-sonnet-4-6"
  github_token:
    description: "Token used to post the review / open the PR. Defaults to the workflow token."
    required: false
    default: ${{ github.token }}
  mode:
    description: "verify (PR gate + review), implement (issue→PR), fix, review (re-review a PR), resolve (resolve merge conflicts), steer (apply a /macrodeploy PR comment), security, coverage, deployaudit (deployment audit), deploysetup (scaffold deploy-on-merge), recommend, research (answer a question about the repo + optional ideas), plan, checklist (audit the repo against .macrodeploy/checklist.md), or qa (headless Chrome QA)."
    required: false
    default: "verify"
  issue_number:
    description: "Issue number (implement mode)."
    required: false
    default: ""
  issue_title:
    description: "Issue title (implement mode)."
    required: false
    default: ""
  issue_body:
    description: "Issue body (implement mode)."
    required: false
    default: ""
  pr_number:
    description: "PR number (fix / steer mode)."
    required: false
    default: ""
  comment_body:
    description: "Steer mode: the `/macrodeploy ...` PR comment body to act on."
    required: false
    default: ""
  start_command:
    description: "QA mode: command to build & start the app (blank = auto-detect Next/Vite/CRA)."
    required: false
    default: ""
  app_port:
    description: "QA mode: port the app listens on."
    required: false
    default: "3000"
  qa_instructions:
    description: "QA mode: specific flows or areas to focus the browser test on (optional)."
    required: false
    default: ""
  feature:
    description: "Plan mode: the feature description to break into tasks."
    required: false
    default: ""
  question:
    description: "Research mode: a free-form question about the repo for the agent to investigate and answer."
    required: false
    default: ""
  checklist:
    description: "Checklist mode: the items to audit (one per line). Overrides .macrodeploy/checklist.md; the dashboard passes the user's selection here."
    required: false
    default: ""
  skill:
    description: "Audit rubric / system prompt, passed by the MacroDeploy dashboard (kept out of this public repo)."
    required: false
    default: ""
  auto_merge:
    description: "Autonomy: 'true' to auto-merge PRs that are green, tested, low-risk, and finding-free."
    required: false
    default: "false"
  block_warnings:
    description: "Strictness: 'true' to treat warning-level findings (not just failures) as blocking — for auto-merge eligibility and for what the autonomous fix flow addresses."
    required: false
    default: "false"
  fix_warnings:
    description: "On-demand: 'true' to make this fix run address warning-level findings too, regardless of block_warnings. Set by the dashboard's manual 'Fix findings' so a user can fix warnings even when they don't block auto-merge."
    required: false
    default: "false"

runs:
  using: "docker"
  # Prebuilt image (published by .github/workflows/build-image.yml) so consumer
  # repos pull instead of rebuilding the Chromium image every run. Requires the
  # GHCR package to be public.
  image: "docker://ghcr.io/sakamotolabs/macrodeploy-action:v1"
  env:
    INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
    INPUT_CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
    INPUT_FAST: ${{ inputs.fast }}
    INPUT_REVIEW: ${{ inputs.review }}
    INPUT_MODEL: ${{ inputs.model }}
    INPUT_MODE: ${{ inputs.mode }}
    INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
    INPUT_ISSUE_TITLE: ${{ inputs.issue_title }}
    INPUT_ISSUE_BODY: ${{ inputs.issue_body }}
    INPUT_PR_NUMBER: ${{ inputs.pr_number }}
    INPUT_COMMENT_BODY: ${{ inputs.comment_body }}
    INPUT_START_COMMAND: ${{ inputs.start_command }}
    INPUT_APP_PORT: ${{ inputs.app_port }}
    INPUT_QA_INSTRUCTIONS: ${{ inputs.qa_instructions }}
    INPUT_PLAN_FEATURE: ${{ inputs.feature }}
    INPUT_QUESTION: ${{ inputs.question }}
    INPUT_CHECKLIST: ${{ inputs.checklist }}
    INPUT_SKILL: ${{ inputs.skill }}
    INPUT_AUTO_MERGE: ${{ inputs.auto_merge }}
    INPUT_BLOCK_WARNINGS: ${{ inputs.block_warnings }}
    INPUT_FIX_WARNINGS: ${{ inputs.fix_warnings }}
    GITHUB_TOKEN: ${{ inputs.github_token }}
